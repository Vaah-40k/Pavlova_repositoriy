<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrekPlan - Создавайте маршруты для активного отдыха</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>

  <body>
    <div id="app">
      <!-- Шапка сайта -->
      <header>
        <div class="container">
          <div class="header-content">
            <a href="#" class="logo">
              <i class="fas fa-route" style="margin-right: 40%"></i>
              <b>TrekPlan</b>
            </a>

            <button class="mobile-menu-btn" @click="toggleMobileMenu">
              <i class="fas fa-bars"></i>
            </button>

            <ul class="nav-menu" :class="{ 'mobile-open': mobileMenuActive }">
              <div class="nav-li">
                <li><a href="#about">О приложении</a></li>
                <li>
                  <a href="#features" style="margin-left: 3em">Возможности</a>
                </li>
              </div>

              <button
                class="btn-login"
                style="margin-left: 2%; margin-right: -5%; margin-bottom: 5%"
              >
                <a v-if="!isLoggedIn" href="./autorization">Войти</a>
                <a v-else href="./trek">Маршруты</a>
              </button>
            </ul>
          </div>
        </div>
      </header>

  </body>
</html>
