<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Russian UI Modal</title>
    <!-- Добавляем Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles_scheduler.css" />
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <!-- Добавляем контейнер для карты (он будет фоном, модалка overlay поверх него) -->
    <div
      id="map"
      style="
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      "
    ></div>

    <div class="overlay" style="z-index: 2; position: relative">
      <div class="container">
        <!-- Header -->
        <header class="header">
          <button class="menu-btn" aria-label="Меню">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path
                d="M3 12H21M3 6H21M3 18H21"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>

          <div class="search-container">
            <input
              type="text"
              class="search-input"
              placeholder="Введите название места..."
            />
            <button class="search-btn-submit" aria-label="Поиск">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle
                  cx="11"
                  cy="11"
                  r="8"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path
                  d="M21 21L16.65 16.65"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>

          <button class="profile-btn">ЛК</button>
        </header>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
          <button class="nav-tab">
            <i class="fas fa-question-circle" style="font-size: 1.2rem"></i>
          </button>
          <button class="nav-tab active">Дни</button>
          <button class="nav-tab">Точки</button>
          <button class="nav-tab">Протяженность</button>
          <button class="nav-tab">Снаряжение</button>
          <button class="nav-tab" id="cost-tab" style="display: none">
            Стоимость
          </button>
        </nav>
        <!-- Modal Content -->
        <div class="modal">
          <div class="modal-header">
            <h2 class="modal-title">Название</h2>
          </div>

          <div id="tab-content-info" class="tab-content" style="display: none">
            <div class="info-section">
              <label
                style="display: block; margin-bottom: 10px; font-weight: bold"
                >Фотографии маршрута (4 шт.)</label
              >
              <div
                class="photo-grid"
                style="
                  width: 20vw;
                  display: grid;
                  grid-template-columns: repeat(2, 1fr);
                  gap: 10px;
                  margin-bottom: 20px;
                "
              >
                <div
                  class="photo-slot"
                  data-index="0"
                  style="
                    aspect-ratio: 1/1;
                    background: #f0f0f0;
                    border: 2px dashed #ccc;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    cursor: pointer;
                    border-radius: 8px;
                    overflow: hidden;
                    position: relative;
                  "
                >
                  <i
                    class="fas fa-plus"
                    style="color: #aaa; font-size: 24px"
                  ></i>
                  <input
                    type="file"
                    accept="image/*"
                    hidden
                    class="photo-input"
                  />
                  <img
                    class="photo-preview"
                    style="
                      width: 100%;
                      height: 100%;
                      object-fit: cover;
                      display: none;
                    "
                  />
                </div>
                <div
                  class="photo-slot"
                  data-index="1"
                  style="
                    aspect-ratio: 1/1;
                    background: #f0f0f0;
                    border: 2px dashed #ccc;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    cursor: pointer;
                    border-radius: 8px;
                    overflow: hidden;
                    position: relative;
                  "
                >
                  <i
                    class="fas fa-plus"
                    style="color: #aaa; font-size: 24px"
                  ></i>
                  <input
                    type="file"
                    accept="image/*"
                    hidden
                    class="photo-input"
                  />
                  <img
                    class="photo-preview"
                    style="
                      width: 100%;
                      height: 100%;
                      object-fit: cover;
                      display: none;
                    "
                  />
                </div>
                <div
                  class="photo-slot"
                  data-index="2"
                  style="
                    aspect-ratio: 1/1;
                    background: #f0f0f0;
                    border: 2px dashed #ccc;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    cursor: pointer;
                    border-radius: 8px;
                    overflow: hidden;
                    position: relative;
                  "
                >
                  <i
                    class="fas fa-plus"
                    style="color: #aaa; font-size: 24px"
                  ></i>
                  <input
                    type="file"
                    accept="image/*"
                    hidden
                    class="photo-input"
                  />
                  <img
                    class="photo-preview"
                    style="
                      width: 100%;
                      height: 100%;
                      object-fit: cover;
                      display: none;
                    "
                  />
                </div>
                <div
                  class="photo-slot"
                  data-index="3"
                  style="
                    aspect-ratio: 1/1;
                    background: #f0f0f0;
                    border: 2px dashed #ccc;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    cursor: pointer;
                    border-radius: 8px;
                    overflow: hidden;
                    position: relative;
                  "
                >
                  <i
                    class="fas fa-plus"
                    style="color: #aaa; font-size: 24px"
                  ></i>
                  <input
                    type="file"
                    accept="image/*"
                    hidden
                    class="photo-input"
                  />
                  <img
                    class="photo-preview"
                    style="
                      width: 100%;
                      height: 100%;
                      object-fit: cover;
                      display: none;
                    "
                  />
                </div>
              </div>

              <label
                style="display: block; margin-bottom: 10px; font-weight: bold"
                >Описание маршрута</label
              >
              <textarea
                id="route-desc-area"
                placeholder="Расскажите подробнее о путешествии..."
                style="
                  width: 100%;
                  height: 120px;
                  padding: 10px;
                  border: 1px solid #ccc;
                  border-radius: 8px;
                  resize: none;
                  margin-top: 10px;
                "
              ></textarea>
            </div>
          </div>

          <div id="tab-content-days" class="tab-content" style="display: block">
            <div class="modal-controls">
              <button class="control-btn active">+ День</button>
              <button class="control-btn">- День</button>
              <button class="control-btn">+ запись</button>
              <button class="control-btn">- запис</button>
            </div>

            <div class="days-list">
              <div class="day-item active">
                <div
                  class="day-header"
                  style="font-weight: bold; cursor: pointer"
                >
                  День 1
                </div>
                <div class="record-list"></div>
              </div>
            </div>
          </div>

          <div
            id="tab-content-points"
            class="tab-content"
            style="display: none"
          >
            <div class="days-list">
              <div class="day-item">Нет точек</div>
            </div>
          </div>

          <div
            id="tab-content-distance"
            class="tab-content"
            style="display: none"
          >
            <div class="days-list"></div>
          </div>

          <div
            id="tab-content-equipment"
            class="tab-content"
            style="display: none"
          >
            <div class="modal-controls">
              <button class="control-btn active">+ Снаряжение</button>
              <button class="control-btn">- Снаряжение</button>
            </div>

            <div class="days-list" data-equipment-list>
              <div class="day-item" data-equipment-item>
                Список снаряжения пуст
              </div>
            </div>
          </div>

          <div id="tab-content-cost" class="tab-content" style="display: none">
            <div class="modal-controls">
              <button class="control-btn active">+ Расход</button>
              <button class="control-btn">- Расход</button>
            </div>

            <div class="days-list">
              <div class="day-item">Список расходов пуст</div>
            </div>
          </div>

          <div class="modal-actions">
            <button id="clear-btn-custom" class="action-btn secondary">
              Очистить
            </button>
            <button class="action-btn primary">Сохранить</button>
          </div>
        </div>
        <div class="resizer"></div>
      </div>
    </div>

    <!-- Добавляем Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // --- 1. ИНИЦИАЛИЗАЦИЯ КАРТЫ ---
        const map = L.map("map", { zoomControl: false }).setView(
          [55.7558, 37.6173],
          10,
        );

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "&copy; OpenStreetMap | OpenTopoMap",
          maxZoom: 17,
        }).addTo(map);
        // opentopomap - такая карта
        // openstreetmap - другая карта

        L.control.zoom({ position: "topright" }).addTo(map);

        // --- 2. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        let markers = []; // Объекты маркеров Leaflet
        let pointNames = []; // Имена точек (синхронизированы по индексу с markers)
        let routeLayer = null; // Слой линии маршрута
        let routeData = null; // Данные от сервера (дистанция, сегменты)
        let routeName = "Название маршрута";
        let dashedLayers = []; // Пунктирные линии

        // Элементы UI
        const container = document.querySelector(".container");
        const modalTitle = document.querySelector(".modal-title");

        modalTitle.textContent = routeName;

        // --- 3. ПРОВЕРКА РОЛИ (Cookie JWT) ---
        function getCookie(name) {
          const value = `; ${document.cookie}`;
          const parts = value.split(`; ${name}=`);
          if (parts.length === 2) return parts.pop().split(";").shift();
        }

        function checkUserRole() {
          const token = getCookie("token");
          if (!token) return "participant";
          try {
            // Декодируем JWT (часть после первой точки)
            const base64Url = token.split(".")[1];
            const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
            const jsonPayload = decodeURIComponent(
              atob(base64)
                .split("")
                .map(function (c) {
                  return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
                })
                .join(""),
            );

            return JSON.parse(jsonPayload).role || "participant";
          } catch (e) {
            console.error("Ошибка чтения токена", e);
            return "participant";
          }
        }

        const userRole = checkUserRole();
        const costTab = document.getElementById("cost-tab");

        // Логика отображения вкладки
        if (costTab) {
          // В системе роль называется 'organizer' (это и есть Гид)
          if (userRole === "organizer" || userRole === "admin") {
            costTab.style.display = "inline-block"; // Или 'block', зависит от CSS flex
          } else {
            costTab.style.display = "none !important";
            // Если вкладка скрыта, удаляем её из потока, чтобы не мешала
            costTab.remove();
          }
        }

        // --- 4. РЕДАКТИРОВАНИЕ ЗАГОЛОВКА МАРШРУТА ---
        modalTitle.addEventListener("dblclick", () => {
          // Блокируем редактирование, ТОЛЬКО если сейчас открыта вкладка "Дни"
          if (
            document.getElementById("tab-content-distance").style.display ===
            "block"
          ) {
            modalTitle.contentEditable = false;
            return;
          }

          // Во всех остальных вкладках — разрешаем
          modalTitle.contentEditable = true;
          modalTitle.classList.add("editing-title"); // Опционально для стилей
          modalTitle.focus();
        });

        modalTitle.addEventListener("blur", () => {
          modalTitle.contentEditable = false;
          modalTitle.classList.remove("editing-title");
          routeName = modalTitle.textContent.trim() || "Название маршрута";
        });

        modalTitle.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            modalTitle.blur();
          }
        });

        // --- 5. ЛОГИКА КАРТЫ (Добавление точек) ---
        map.on("click", async function (e) {
          if (markers.length >= 20) {
            alert("Максимум 20 точек");
            return;
          }
          // Добавляем точку
          addMarker(e.latlng.lat, e.latlng.lng);

          // Пересчитываем маршрут
          await recalculateRoute();
        });

        // Универсальная функция добавления маркера
        function addMarker(lat, lng, name = null) {
          const marker = L.marker([lat, lng]).addTo(map);
          markers.push(marker);

          const pName = name || `Точка ${markers.length}`;
          pointNames.push(pName);

          marker.bindPopup(pName);

          // Обновляем список во вкладке "Точки"
          updatePointsList();
        }

        // --- 6. ПОСТРОЕНИЕ МАРШРУТА (API) ---
        async function recalculateRoute() {
          if (markers.length >= 2) {
            await buildRoute();
          } else {
            if (routeLayer) {
              map.removeLayer(routeLayer);
              routeLayer = null;
            }
            dashedLayers.forEach((l) => map.removeLayer(l));
            dashedLayers = [];
            routeData = null;
            // Всегда обновляем список дистанций
            updateDistanceList();
            updateTitle();
          }
        }

        async function buildRoute() {
          const coords = markers.map((m) => [
            m.getLatLng().lng,
            m.getLatLng().lat,
          ]);

          try {
            const response = await fetch("/generate-route", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ coordinates: coords }),
            });

            const data = await response.json();

            if (!response.ok) {
              console.warn("API Warning:", data.error);
              routeData = null;
              if (routeLayer) {
                map.removeLayer(routeLayer);
                routeLayer = null;
              }
              // Всегда обновляем список дистанций, даже при ошибке
              updateDistanceList();
              return;
            }

            routeData = data;

            if (routeLayer) map.removeLayer(routeLayer);

            if (data.geometry) {
              routeLayer = L.geoJSON(data.geometry, {
                style: { color: "#007bff", weight: 5, opacity: 0.8 },
              }).addTo(map);

              map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
            }

            // Всегда обновляем список дистанций
            updateDistanceList();
            updateTitle();
          } catch (error) {
            console.error("Ошибка построения:", error);
            routeData = null;
            updateDistanceList();
          }
        }

        // --- 7. ВКЛАДКА "ТОЧКИ" (С ПЕРЕИМЕНОВАНИЕМ) ---
        function updatePointsList() {
          const list = document.querySelector("#tab-content-points .days-list");
          if (!list) return;
          list.innerHTML = "";

          if (pointNames.length === 0) {
            list.innerHTML = '<div class="day-item">Нет точек</div>';
            return;
          }

          pointNames.forEach((name, index) => {
            const item = document.createElement("div");
            item.className = "day-item";
            item.style.display = "flex";
            item.style.alignItems = "center";

            // Иконка маркера (для красоты и зума к точке)
            const icon = document.createElement("i");
            icon.className = "fas fa-map-marker-alt";
            icon.style.color = "#3388ff";
            icon.style.marginRight = "10px";
            icon.style.cursor = "pointer";
            icon.onclick = () => {
              map.flyTo(markers[index].getLatLng(), 15);
            };

            // Текстовое поле имени
            const nameSpan = document.createElement("span");
            nameSpan.textContent = name; // Убрали индекс из имени для чистоты, или можно оставить `${index + 1}. ${name}`
            nameSpan.style.cursor = "pointer";
            nameSpan.style.flex = "1";
            nameSpan.style.borderBottom = "1px dashed transparent";
            nameSpan.title = "Нажмите, чтобы переименовать";

            // Логика переименования
            nameSpan.addEventListener("click", function () {
              this.contentEditable = true;
              this.focus();
              this.style.borderBottom = "1px solid #007bff";
              this.style.backgroundColor = "#f0f8ff";
            });

            // Сохранение при потере фокуса
            nameSpan.addEventListener("blur", function () {
              this.contentEditable = false;
              this.style.borderBottom = "1px dashed transparent";
              this.style.backgroundColor = "transparent";

              let newName = this.textContent.trim();
              if (!newName) newName = `Точка ${index + 1}`;

              // Сохраняем новое имя в массив
              pointNames[index] = newName;
              this.textContent = newName;

              // Обновляем попап на карте
              markers[index].bindPopup(newName);

              // Обновляем вкладку "Протяженность" и селекты в "Днях"
              updateDistanceList();

              // Если нужно обновить селекты в днях, можно вызвать обновление (опционально)
              const daysList = document.querySelector(
                "#tab-content-days .days-list",
              );
              // Здесь можно добавить логику обновления выпадающих списков, если они открыты
            });

            nameSpan.addEventListener("keydown", (e) => {
              if (e.key === "Enter") {
                e.preventDefault();
                nameSpan.blur();
              }
            });

            item.appendChild(icon);
            item.appendChild(nameSpan);
            list.appendChild(item);
          });
        }
        // --- 8. ВКЛАДКА "ПРОТЯЖЕННОСТЬ" (ПАРЫ ТОЧЕК) ---
        function updateDistanceList() {
          const list = document.querySelector(
            "#tab-content-distance .days-list",
          );
          if (!list) return;

          // Очищаем список каждый раз
          list.innerHTML = "";

          // Если точек меньше 2
          if (markers.length < 2) {
            list.innerHTML =
              '<div class="day-item">Добавьте минимум 2 точки</div>';
            return;
          }

          let totalDistance = 0;

          // СЦЕНАРИЙ A: Есть данные от сервера (маршрут по дорогам)
          if (
            routeData &&
            routeData.segments &&
            routeData.segments.length > 0
          ) {
            routeData.segments.forEach((seg, index) => {
              // Безопасная проверка имен
              const name1 = pointNames[index] || `Точка ${index + 1}`;
              const name2 = pointNames[index + 1] || `Точка ${index + 2}`;

              // Добавляем запись в список
              addDistanceRow(list, name1, name2, seg.distance, "road");
            });
          }

          // СЦЕНАРИЙ B: Нет данных от сервера (считаем по прямой)
          // Выполняется, если API вернул ошибку или routeData null
          if (
            !routeData ||
            !routeData.segments ||
            routeData.segments.length === 0
          ) {
            for (let i = 0; i < markers.length - 1; i++) {
              const latlng1 = markers[i].getLatLng();
              const latlng2 = markers[i + 1].getLatLng();
              const distKm = latlng1.distanceTo(latlng2) / 1000;

              totalDistance += distKm;

              const name1 = pointNames[i] || `Точка ${i + 1}`;
              const name2 = pointNames[i + 1] || `Точка ${i + 2}`;

              addDistanceRow(
                list,
                name1,
                name2,
                distKm.toFixed(2) + " км",
                "direct",
              );
            }
          }
        }

        // Вспомогательная функция для отрисовки строки расстояния между двумя точками
        function addDistanceRow(container, name1, name2, distStr, type) {
          const row = document.createElement("div");
          row.className = "day-item";
          row.style.display = "flex";
          row.style.justifyContent = "space-between";
          row.style.alignItems = "center";
          row.style.padding = "8px";
          row.style.marginBottom = "5px";
          row.style.borderBottom = "1px solid #eee";
          row.style.fontSize = "0.9em";

          const icon =
            type === "road"
              ? '<i class="fas fa-route" style="margin-right: 8px; color: #007bff;"></i>'
              : '<i class="fas fa-ruler" style="margin-right: 8px; color: #6c757d;"></i>';

          row.innerHTML = `
                  <span style="color:#555; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;">
                      <strong>${name1}</strong> : <strong>${name2}</strong>
                  </span>
                  <span style="font-weight:bold; color:#303f69; white-space:nowrap; margin-left: 10px;">
                      ${icon} ${distStr}
                  </span>
              `;
          container.appendChild(row);
        }

        // Вспомогательная функция для отрисовки строки общей дистанции

        // --- 9. ВКЛАДКА "ДНИ" (С ВОССТАНОВЛЕНИЕМ) ---

        // Функция создания DOM элемента Дня
        function createDayElement(title) {
          const dayDiv = document.createElement("div");
          dayDiv.className = "day-item";
          dayDiv.innerHTML = `<div class="day-header" style="font-weight:bold; cursor:pointer;">${title}</div><div class="record-list"></div>`;

          // Выделение активного дня
          dayDiv.addEventListener("click", function (e) {
            // Если клик не по инпутам
            if (
              e.target.tagName !== "INPUT" &&
              e.target.tagName !== "SELECT" &&
              !e.target.classList.contains("remove-rec")
            ) {
              document
                .querySelectorAll("#tab-content-days .day-item")
                .forEach((d) => d.classList.remove("active"));
              dayDiv.classList.add("active");
            }
          });
          return dayDiv;
        }

        // Функция добавления записи (точка/текст + время) в день
        function addRecordToDay(
          recordList,
          timeVal = "12:00",
          pointNameVal = "",
          textVal = "",
          isTextMode = false,
        ) {
          const recDiv = document.createElement("div");
          recDiv.className = "record-item";

        async function loadRouteFromUrl() {
          const params = new URLSearchParams(window.location.search);
          const id = params.get("id");
          const type = params.get("type");
          if (!id) return;

          try {
            const res = await fetch(
              `/api/get-route-details?id=${id}&type=${type}`,
            );
            const data = await res.json();
            if (!res.ok) return;

            // 1. Имя
            routeName = data.name;
            modalTitle.textContent = routeName;
            document.getElementById("route-desc-area").value =
              data.description || "";

            // 2. Фотографии
            // Ожидается, что сервер отдает массив data.photos
            if (
              data.photos &&
              Array.isArray(data.photos) &&
              data.photos.length > 0
            ) {
              const slots = document.querySelectorAll(".photo-slot");

              data.photos.forEach((path, i) => {
                if (!slots[i]) return;

                const img = slots[i].querySelector(".photo-preview");
                const icon = slots[i].querySelector("i");

                // ВАЖНО: Проверяем, начинается ли путь со слэша.
                // Если нет — добавляем, иначе ссылка будет битой (http://siteuploads/...)
                const safePath = path.startsWith("/") ? path : "/" + path;

                img.src = window.location.origin + safePath;
                img.style.display = "block";
                icon.style.display = "none";

                // Помечаем, что это файл с сервера, чтобы валидация при сохранении не ругалась
                photoFiles[i] = "SERVER_FILE";

                  const removeBtn = d.querySelector("button");
                  removeBtn.onclick = () => {
                    d.remove();
                    // Если удалили все элементы, показываем заглушку
                    if (costList.children.length === 0) {
                      costList.innerHTML =
                        '<div class="day-item">Список расходов пуст</div>';
                    }
                  };

                  costList.appendChild(d);
                }
              });
            }
          } catch (e) {
            console.error("Ошибка загрузки маршрута:", e);
          }
        }

        loadRouteFromUrl();

        // --- 12. ПОИСК ---
        async function handleSearch() {
          const val = document.querySelector(".search-input").value;
          if (!val) return;
          try {
            const r = await fetch(
              `https://nominatim.openstreetmap.org/search?q=${val}&format=json&limit=1`,
            );
            const d = await r.json();
            if (d.length) map.flyTo([d[0].lat, d[0].lon], 13);
            else alert("Не найдено");
          } catch (e) {
            alert("Ошибка поиска");
          }
        }
        document.querySelector(".search-btn-submit").onclick = handleSearch;
        document.querySelector(".search-input").onkeyup = (e) => {
          if (e.key === "Enter") handleSearch();
        };

        // --- 13. УДАЛЕНИЕ ПОСЛЕДНЕЙ МЕТКИ ---
        const modalActions = document.querySelector(".modal-actions");
        const clearBtn = document.createElement("button");
        clearBtn.className = "action-btn secondary";
        clearBtn.textContent = "Убрать метку";
        clearBtn.onclick = async () => {
          if (markers.length > 0) {
            const m = markers.pop();
            map.removeLayer(m);
            pointNames.pop();
            updatePointsList();
            await recalculateRoute();
          }
        };
        modalActions.insertBefore(clearBtn, modalActions.firstChild);
        // Удаляем кнопку "Очистить" из верстки, если она была дефолтной, или скрываем
        if (document.getElementById("clear-btn-custom"))
          document.getElementById("clear-btn-custom").remove();

        // --- 14. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ---
        const navTabs = document.querySelectorAll(".nav-tab");
        const tabContents = document.querySelectorAll(".tab-content");

        navTabs.forEach((tab, i) => {
          tab.onclick = () => {
            // Убираем активный класс у всех кнопок и скрываем контент
            navTabs.forEach((t) => t.classList.remove("active"));
            tabContents.forEach((c) => (c.style.display = "none"));

            // Добавляем активный класс текущей кнопке
            tab.classList.add("active");

            // Индексы соответствуют: 0-info, 1-days, 2-points, 3-distance, 4-equipment, 5-cost
            const ids = [
              "info",
              "days",
              "points",
              "distance",
              "equipment",
              "cost",
            ];
            const targetId = ids[i];

            if (targetId) {
              const tabContent = document.getElementById(
                `tab-content-${targetId}`,
              );
              if (tabContent) {
                tabContent.style.display = "block";

                // Специфическая логика для вкладки дистанции
                if (targetId === "distance") {
                  updateDistanceList();
                }
              }
              updateTitle();
            }
          };
        });

        function updateTitle() {
          const active = document.querySelector(".nav-tab.active");
          if (active && active.textContent === "Протяженность") {
            // При заходе на вкладку "Протяженность" обновляем список
            updateDistanceList();

            if (routeData && routeData.distance) {
              modalTitle.textContent = `Дистанция: ${routeData.distance}`;
            } else if (markers.length >= 2) {
              // Рассчитываем общее расстояние по прямой для заголовка
              let totalDistance = 0;
              for (let i = 0; i < markers.length - 1; i++) {
                const latlng1 = markers[i].getLatLng();
                const latlng2 = markers[i + 1].getLatLng();
                totalDistance += latlng1.distanceTo(latlng2) / 1000;
              }
              modalTitle.textContent = `Дистанция: ${totalDistance.toFixed(2)} км`;
            } else {
              modalTitle.textContent = routeName;
            }
          } else {
            modalTitle.textContent = routeName;
          }
        }

        function restoreRouteDays(routeDaysData) {
          const list = document.querySelector("#tab-content-days .days-list");

          if (!routeDaysData || routeDaysData === "[]") return;

          list.innerHTML = "";

          let daysArray = [];
          try {
            daysArray =
              typeof routeDaysData === "string"
                ? JSON.parse(routeDaysData)
                : routeDaysData;
            if (!Array.isArray(daysArray)) return;
          } catch (e) {
            console.error("Ошибка парсинга дней:", e);
            return;
          }

          daysArray.forEach((dayRecords, dayIndex) => {
            const dayElement = createDayElement(`День ${dayIndex + 1}`);
            list.appendChild(dayElement);

            const recordList = dayElement.querySelector(".record-list");

            if (Array.isArray(dayRecords)) {
              dayRecords.forEach((rec) => {
                const timeVal = rec.time || "12:00";
                const isTextMode =
                  rec.is_text == 1 ||
                  rec.is_text === "true" ||
                  rec.is_text === true;

                if (isTextMode) {
                  addRecordToDay(recordList, timeVal, "", rec.note || "", true);
                } else {
                  addRecordToDay(
                    recordList,
                    timeVal,
                    rec.point_name || `Точка ${rec.point_index || 1}`, // Fallback, если point_name нет
                    "",
                    false,
                  );
                }
              });
            }
          });

          if (list.firstChild) {
            document
              .querySelectorAll("#tab-content-days .day-item")
              .forEach((d) => d.classList.remove("active"));
            list.firstChild.classList.add("active");
          }
        }

        // --- 15. ПЕРЕХОД В ЛК ---
        document.querySelector(".profile-btn").onclick = () =>
          (window.location.href = "/lk");

        function initianDragAndDropModalWindow() {
          const header = document.querySelector(".header");

          let isDragging = false;
          let currentX,
            currentY,
            initialX = 0,
            initialY = 0;
          let xOffset = 0,
            yOffset = 0;

          header.addEventListener("mousedown", dragStart);
          document.addEventListener("mousemove", drag);
          document.addEventListener("mouseup", dragEnd);

          function dragStart(e) {
            if (e.target.closest("button") || e.target.closest("input")) return;
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            if (header.contains(e.target)) isDragging = true;
          }

          function drag(e) {
            if (isDragging) {
              e.preventDefault();
              currentX = e.clientX - initialX;
              currentY = e.clientY - initialY;
              xOffset = currentX;
              yOffset = currentY;
              container.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
          }

          function dragEnd() {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
          }
        }

        initianDragAndDropModalWindow();

        // --- 16. СВОРАЧИВАНИЕ ОКНА (Оставляем вашу логику) ---
        const menuBtn = document.querySelector(".menu-btn");
        menuBtn.onclick = () => {
          container.classList.toggle("collapsed");
          if (container.classList.contains("collapsed"))
            container.style.height = "60px";
          else container.style.height = "auto";
        };

        // Инициализация кнопок Снаряжения и Стоимости
        ["equipment", "cost"].forEach((type) => {
          const blk = document.getElementById(`tab-content-${type}`);
          if (blk) {
            const btns = blk.querySelectorAll(".control-btn");
            const list = blk.querySelector(".days-list");
            if (btns.length >= 2) {
              btns[0].onclick = () => {
                // Add
                const d = document.createElement("div");
                d.className = "day-item";

                if (type === "equipment") {
                  // Для снаряжения: редактируемый элемент с кнопкой удаления
                  d.style.display = "flex";
                  d.style.alignItems = "center";
                  d.style.justifyContent = "space-between";
                  d.style.padding = "8px";
                  d.style.marginBottom = "5px";
                  d.style.border = "1px solid #eee";
                  d.style.borderRadius = "4px";

                  const textSpan = document.createElement("span");
                  textSpan.textContent = "Новая вещь";
                  textSpan.contentEditable = true;
                  textSpan.style.flex = "1";
                  textSpan.style.padding = "5px";
                  textSpan.style.minWidth = "150px";
                  textSpan.style.outline = "none";

                  // Подсветка при редактировании
                  textSpan.addEventListener("focus", function () {
                    this.style.backgroundColor = "#f0f0f03b";
                    this.style.borderTop = "1px solid rgba(255, 255, 255, 0.1)";
                  });

                  textSpan.addEventListener("blur", function () {
                    this.style.backgroundColor = "transparent";
                    this.style.border = "none";
                  });

                  // Кнопка удаления
                  const delBtn = document.createElement("button");
                  delBtn.innerHTML = "&times;";
                  delBtn.style.color = "red";
                  delBtn.style.border = "none";
                  delBtn.style.background = "transparent";
                  delBtn.style.cursor = "pointer";
                  delBtn.style.marginLeft = "10px";
                  delBtn.style.fontSize = "18px";
                  delBtn.style.width = "24px";
                  delBtn.style.height = "24px";
                  delBtn.style.display = "flex";
                  delBtn.style.alignItems = "center";
                  delBtn.style.justifyContent = "center";
                  delBtn.onclick = () => {
                    d.remove();
                    // Если удалили все элементы, показываем заглушку
                    if (
                      list.children.length === 1 &&
                      list.firstChild.textContent.includes("пуст")
                    ) {
                      // Оставляем заглушку
                    } else if (list.children.length === 0) {
                      list.innerHTML =
                        '<div class="day-item">Список снаряжения пуст</div>';
                    }
                  };

                  d.appendChild(textSpan);
                  d.appendChild(delBtn);
                } else {
                  // Для расходов: два инпута
                  d.style.display = "flex";
                  d.style.alignItems = "center";
                  d.style.gap = "10px";
                  d.style.padding = "8px";
                  d.style.marginBottom = "5px";
                  d.style.border = "1px solid #eee";
                  d.style.borderRadius = "4px";

                  d.innerHTML = `
                                  <input placeholder="Название" style="flex: 1; padding: 5px; border: 1px solid #ccc; border-radius: 3px;">
                                  <input type="number" placeholder="0" style="width: 80px; padding: 5px; border: 1px solid #ccc; border-radius: 3px;">
                                  <button style="color: red; border: none; background: transparent; cursor: pointer; font-size: 18px;">&times;</button>
                              `;

                  // Добавляем обработчик удаления
                  const removeBtn = d.querySelector("button");
                  removeBtn.onclick = () => {
                    d.remove();
                    // Если удалили все элементы, показываем заглушку
                    if (
                      list.children.length === 1 &&
                      list.firstChild.textContent.includes("пуст")
                    ) {
                      // Оставляем заглушку
                    } else if (list.children.length === 0) {
                      list.innerHTML =
                        '<div class="day-item">Список расходов пуст</div>';
                    }
                  };
                }

                // Удаляем заглушку "пустой список" если она есть
                const placeholder = list.querySelector("[data-equipment-item]");
                if (placeholder) {
                  placeholder.remove();
                }

                list.appendChild(d);
              };

              btns[1].onclick = () => {
                // Remove - удаляем последний элемент
                if (list.children.length > 0) {
                  const lastChild = list.lastChild;
                  if (
                    !lastChild.textContent.includes("пуст") &&
                    !lastChild.textContent.includes("Список")
                  ) {
                    lastChild.remove();

                    // Если после удаления список пуст, показываем заглушку
                    if (list.children.length === 0) {
                      if (type === "equipment") {
                        list.innerHTML =
                          '<div class="day-item">Список снаряжения пуст</div>';
                      } else {
                        list.innerHTML =
                          '<div class="day-item">Список расходов пуст</div>';
                      }
                    }
                  }
                }
              };
            }
          }
        });
      });

      async function saveRoute() {
        const formData = new FormData();

        // Основные данные
        formData.append("name", routeName);
        formData.append(
          "description",
          document.getElementById("route-desc-area").value || "",
        );
        formData.append(
          "length",
          routeData ? parseFloat(routeData.distance) * 1000 : 0,
        );
        formData.append(
          "duration",
          routeData ? routeData.duration.replace(" ч", "") : "0",
        );

        // Координаты карты
        formData.append("map_zoom", map.getZoom());
        const center = map.getCenter();
        formData.append("map_center", `${center.lat},${center.lng}`);

        // Точки (points)
        formData.append(
          "points",
          JSON.stringify(
            markers.map((m) => ({
              lat: m.getLatLng().lat,
              lng: m.getLatLng().lng,
              name: pointNames[markers.indexOf(m)] || "",
            })),
          ),
        );

        // Снаряжение (equipment)
        const equipment = [];
        document
          .querySelectorAll("#tab-content-equipment .day-item")
          .forEach((item) => {
            const text = item.querySelector("span")?.textContent.trim();
            if (text && text !== "Список снаряжения пуст")
              equipment.push({ name: text });
          });
        formData.append("equipment", JSON.stringify(equipment));

        // Расходы (costs)
        const costs = [];
        document
          .querySelectorAll("#tab-content-cost .day-item")
          .forEach((item) => {
            const name = item
              .querySelector("input[placeholder='Название']")
              ?.value.trim();
            const amount =
              parseFloat(item.querySelector("input[type='number']")?.value) ||
              0;
            if (name) costs.push({ name, amount });
          });
        formData.append("costs", JSON.stringify(costs));

        // Организационный взнос (из модалки, если показана)
        const orgCost = document.getElementById("org-cost-input")?.value || 0;
        formData.append("cost_organization", orgCost);

        // Фото
        document.querySelectorAll(".photo-slot").forEach((slot, i) => {
          const input = slot.querySelector(".photo-input");
          if (input.files[0]) {
            formData.append(`photo_${i}`, input.files[0]);
          }
        });

        const days = [];
        document
          .querySelectorAll("#tab-content-days .day-item")
          .forEach((day) => {
            const dayRecords = [];
            day.querySelectorAll(".record-item").forEach((rec) => {
              const timeInput = rec.querySelector(".time-input");
              const select = rec.querySelector(".point-select");
              const noteInput = rec.querySelector(".note-input");

              const isText = noteInput.style.display !== "none";
              const pointIndex = isText ? 0 : parseInt(select.value) || 0;
              const note = isText ? noteInput.value || "" : "";

              // Добавление point_name (текст из выбранного option в select)
              const pointName = isText
                ? null
                : select.options[select.selectedIndex]?.text || "";

              dayRecords.push({
                time: timeInput ? timeInput.value : "12:00",
                is_text: isText,
                point_name: pointName, // Новое: сохраняем имя точки
                note: note,
                point_index: pointIndex,
              });
            });
            days.push(dayRecords);
          });
        formData.append("Route_Days", JSON.stringify(days));

        try {
          const res = await fetch("/api/save-custom-route", {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          if (data.status === "ok") {
            alert("Сохранено!");
            // Обновляем URL с ID маршрута, чтобы при перезагрузке загрузилось
            if (data.route_id) {
              const newUrl = new URL(window.location);
              newUrl.searchParams.set("id", data.route_id);
              newUrl.searchParams.set("type", "custom");
              window.history.pushState({}, "", newUrl);
              // Можно перезагрузить данные, если нужно
              loadRouteFromUrl();
            }
          } else {
            alert(data.error || "Ошибка сохранения");
          }
        } catch (e) {
          console.error("Ошибка:", e);
          alert("Ошибка сохранения");
        }
      }

      document.addEventListener("DOMContentLoaded", loadRouteFromUrl);
    </script>
